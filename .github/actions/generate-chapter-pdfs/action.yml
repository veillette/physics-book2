name: Generate Chapter PDFs
description: >-
  Start Eleventy serve, generate chapter PDFs with Playwright, and copy them to
  assets/pdf/. Requires a prior Eleventy build and Playwright browser install.

inputs:
  max-concurrency:
    description: Parallel browser count for PDF generation
    required: false
    default: "4"

runs:
  using: composite
  steps:
    - name: Generate chapter PDFs
      shell: bash
      env:
        MAX_CONCURRENCY: ${{ inputs.max-concurrency }}
      run: |
        set -euo pipefail

        cleanup() {
          pkill -f 'eleventy.*--serve' 2>/dev/null || pkill -f eleventy 2>/dev/null || true
        }
        trap cleanup EXIT

        nohup npx @11ty/eleventy --serve --port=4000 > /tmp/eleventy-serve.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -sf http://localhost:4000/physics-book2/ > /dev/null; then
            echo "Eleventy server is ready"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "::error::Eleventy server failed to start"
            cat /tmp/eleventy-serve.log || true
            exit 1
          fi
          echo "Waiting for Eleventy server... ($i/30)"
          sleep 2
        done

        set +e
        node scripts/generate-pdf-parallel.js
        gen_status=$?
        set -e
        if [ "$gen_status" -ne 0 ]; then
          echo "::warning::Parallel PDF generation had failures; regenerating..."
          node scripts/regenerate-failed-pdfs.js || true
        fi

        mkdir -p assets/pdf
        if compgen -G "pdf-output/*.pdf" > /dev/null; then
          cp -v pdf-output/*.pdf assets/pdf/
        fi
        pdf_count=$(ls -1 assets/pdf/*.pdf 2>/dev/null | wc -l || echo 0)
        echo "Copied ${pdf_count} PDF(s) to assets/pdf/"
        if [ "$pdf_count" -eq 0 ]; then
          echo "::warning::No PDFs were generated; download buttons will 404 on the deployed site."
        fi
