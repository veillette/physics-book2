# Workflow for generating PDFs from the physics book
#
# Status: Fully automated and production-ready (since 2025-12-31)
# - Runs once every three months (1st of Jan, Apr, Jul, Oct) at 00:00 UTC
# - Generates 309 PDFs in ~60 minutes using parallel processing
# - Automatic failure recovery with extended timeouts
# - Smart commits (only when PDFs change)
#
# Builds the site with Eleventy, renders the chapter PDFs with Playwright, and publishes
# them to the `pdfs` GitHub Release (they are gitignored — decision D6). The deploy
# workflow restores them from that release into assets/pdf/ before its own build.
name: Generate PDFs

on:
  # Runs once every three months on the 1st at 00:00 UTC (Jan, Apr, Jul, Oct)
  schedule:
    - cron: "0 0 1 */3 *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Optionally run on content changes (commented out to avoid excessive regeneration)
  # push:
  #   paths:
  #     - 'contents/**/*.md'
  #     - 'assets/css/**'
  #     - 'scripts/generate-pdf*.js'

# Permissions needed to create releases
permissions:
  contents: write

# Prevent concurrent PDF generation runs
concurrency:
  group: "pdf-generation"
  cancel-in-progress: false

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run generate:pdf:install

      - name: Build with Eleventy
        run: npx @11ty/eleventy

      - name: Start Eleventy server in background
        run: |
          nohup npx @11ty/eleventy --serve --port=4000 > /tmp/eleventy-serve.log 2>&1 &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:4000/physics-book2/ > /dev/null; then
              echo "Eleventy server is ready"
              break
            fi
            echo "Waiting for Eleventy server... ($i/30)"
            sleep 2
          done

      - name: Generate all PDFs (parallel)
        run: node scripts/generate-pdf-parallel.js
        env:
          MAX_CONCURRENCY: 4
        continue-on-error: true
        id: pdf_gen

      - name: Regenerate any failed PDFs
        if: steps.pdf_gen.outcome != 'success'
        run: node scripts/regenerate-failed-pdfs.js || true

      - name: Generate complete book PDF (not yet implemented)
        run: npm run generate:pdf -- --book
        continue-on-error: true
        # Note: This step currently fails but is kept for future implementation
        # The --book option exists but needs integration with parallel processing

      - name: Stop Eleventy server
        if: always()
        run: pkill -f eleventy || true

      - name: Copy PDFs to assets directory
        run: |
          mkdir -p assets/pdf
          # Copy all generated PDFs
          cp -v pdf-output/*.pdf assets/pdf/ 2>&1 | tee /tmp/pdf-copy.log || true
          # Count PDFs
          echo "Total PDFs generated: $(ls -1 pdf-output/*.pdf 2>/dev/null | wc -l)"
          echo "Total PDFs in assets: $(ls -1 assets/pdf/*.pdf 2>/dev/null | wc -l)"
          # Show largest PDFs
          echo "Largest PDFs:"
          du -h assets/pdf/*.pdf | sort -hr | head -10

      - name: Calculate generation time
        id: gen_time
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Get current date for release tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # PDFs are gitignored build artifacts (D6); publish them to the `pdfs` GitHub Release
      # so the deploy workflow can restore them into assets/pdf/ before the Eleventy build.
      - name: Publish PDFs to the 'pdfs' release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ls assets/pdf/*.pdf >/dev/null 2>&1; then
            gh release view pdfs >/dev/null 2>&1 || \
              gh release create pdfs --title "Chapter PDFs" \
                --notes "Latest generated chapter PDFs (updated by generate-pdfs.yml)."
            gh release upload pdfs assets/pdf/*.pdf --clobber
            echo "Published $(ls -1 assets/pdf/*.pdf | wc -l) PDF(s) to the 'pdfs' release."
          else
            echo "::warning::No PDFs were generated; nothing to publish."
          fi

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: physics-book2-pdfs-${{ steps.date.outputs.date }}
          path: assets/pdf/
          retention-days: 90

      - name: Write generation summary
        if: always()
        run: |
          echo "## PDF Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Generation Time** | ${{ steps.gen_time.outputs.duration }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Date** | ${{ steps.date.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PDF_COUNT=$(ls -1 assets/pdf/*.pdf 2>/dev/null | wc -l)
          TOTAL_SIZE=$(du -sh assets/pdf/ 2>/dev/null | awk '{print $1}')

          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 **PDFs have been successfully generated!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary:" >> $GITHUB_STEP_SUMMARY
            echo "- **Total PDFs:** $PDF_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Size:** $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **PDF Types:** Sections, Chapter Intros, Combined Chapters" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Largest Files:" >> $GITHUB_STEP_SUMMARY
            du -h assets/pdf/*.pdf | sort -hr | head -10 | awk '{printf "- %s (%s)\n", $2, $1}' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **PDF generation failed. Please check the logs above for details.**" >> $GITHUB_STEP_SUMMARY
          fi
